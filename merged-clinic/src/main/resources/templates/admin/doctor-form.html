<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Thêm bác sĩ</title>
  <link href="https://fonts.googleapis.com/css2?family=Tinos:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div id="sidebarOverlay" class="sidebar-overlay"></div>
<div class="dash-wrap">

  <aside class="dash-sidebar" style="background:linear-gradient(180deg,#134e4a,#0d9488);">
    <div style="font-size:.82rem;color:#a0d4be;margin-bottom:1.25rem;font-style:italic;"
         th:text="${clinicName}">Phòng Khám</div>
    <div class="profile">
      <div class="profile-av">AD</div>
      <div><div class="profile-name">Quản trị viên</div><div class="profile-role">Admin</div></div>
    </div>
    <a th:href="@{/admin/dashboard}"    class="nav-link">📊&nbsp; Dashboard</a>
    <a th:href="@{/admin/doctors}"      class="nav-link active">👨‍⚕️&nbsp; Bác sĩ</a>
    <a th:href="@{/admin/appointments}" class="nav-link">📋&nbsp; Lịch hẹn</a>
    <div style="margin-top:auto;padding-top:2rem;">
      <a th:href="@{/auth/admin/logout}" class="nav-link" style="color:#f87171;">⏻&nbsp; Đăng xuất</a>
    </div>
  </aside>

  <div class="dash-main">
    <div class="dash-header">
      <div>
        <h2 style="margin-bottom:.15rem;">Thêm bác sĩ mới</h2>
        <div style="font-size:.82rem;color:var(--text-muted);font-style:italic;">
          Tài khoản sẽ được cấp kèm QR code TOTP 2FA
        </div>
      </div>
      <a th:href="@{/admin/doctors}" class="btn btn-outline btn-sm">← Quay lại</a>
    </div>

    <div class="card" style="max-width:580px;">
      <div class="card-body">
        <div th:if="${error}" class="alert alert-error">⚠️ <span th:text="${error}"></span></div>

        <form th:action="@{/admin/doctors/new}" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Họ tên đầy đủ <span class="req">*</span></label>
              <input type="text" name="fullName" placeholder="BS. Nguyễn Văn A" required/>
            </div>
            <div class="form-group">
              <label class="form-label">Chuyên khoa <span class="req">*</span></label>
              <input type="text" name="specialty" placeholder="Nội tổng quát" required/>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Tên đăng nhập <span class="req">*</span></label>
              <input type="text" name="username" placeholder="bs.nguyenvana" required/>
            </div>
            <div class="form-group">
              <label class="form-label">Mật khẩu <span class="req">*</span></label>
              <input type="password" name="password" minlength="8"
                     placeholder="Tối thiểu 8 ký tự" required/>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Email <span class="req">*</span></label>
              <input type="email" name="email" placeholder="bsnguyenvana@clinic.vn" required/>
            </div>
            <div class="form-group">
              <label class="form-label">Số điện thoại</label>
              <input type="text" name="phone" placeholder="0901 234 567"/>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Giới thiệu ngắn</label>
            <textarea name="bio" rows="2"
                      placeholder="Mô tả ngắn về kinh nghiệm và thế mạnh của bác sĩ…"></textarea>
          </div>

          <div class="alert alert-info" style="margin-bottom:1.1rem;">
            📱 Sau khi tạo, hệ thống sẽ hiển thị QR code để bác sĩ quét vào Google Authenticator (2FA).
          </div>

          <button type="submit" class="btn btn-primary btn-full btn-lg">
            Tạo tài khoản bác sĩ →
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
<script th:src="@{/js/app.js}"></script>
<script>
if(window.innerWidth<=768){var mb=document.createElement("div");mb.style="display:flex;background:var(--primary-dark);padding:.75rem 1rem;position:sticky;top:0;z-index:200;align-items:center;gap:.75rem;";mb.innerHTML="<button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>";document.body.insertBefore(mb,document.querySelector(".dash-wrap"));}
</script>
</body>
</html>
