server.port=8080
spring.application.name=clinic-booking

# ── DATABASE ──────────────────────────────────────────────
# H2 in-memory (dev) — đổi sang MySQL khi deploy thật
spring.datasource.url=jdbc:h2:mem:clinicdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.h2.console.enabled=false

spring.thymeleaf.cache=false

# ── EMAIL OTP ─────────────────────────────────────────────
# ⚠️  PRODUCTION: thay bằng biến môi trường, không commit credentials
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=${MAIL_USERNAME:YOUR_EMAIL@gmail.com}
spring.mail.password=${MAIL_PASSWORD:YOUR_APP_PASSWORD}
spring.mail.protocol=smtps
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.connectiontimeout=10000

# ── OTP CONFIG ────────────────────────────────────────────
otp.email.expiry-seconds=300
otp.max-attempts=5
otp.lockout-minutes=15
otp.app-name=PhongKhamDemo

# ── CLINIC INFO ───────────────────────────────────────────
clinic.name=Phòng Khám Đa Khoa Yên Lãng
clinic.address=120 Yên Lãng, Đống Đa, Hà Nội
clinic.phone=1900-8888
