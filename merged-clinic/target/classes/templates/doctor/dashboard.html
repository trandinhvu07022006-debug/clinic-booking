<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Dashboard Bác sĩ</title>
  <link href="https://fonts.googleapis.com/css2?family=Tinos:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div id="sidebarOverlay" class="sidebar-overlay"></div>

<!-- Mobile top bar -->
<div style="display:none;background:var(--primary-dark);padding:.75rem 1rem;position:sticky;top:0;z-index:200;align-items:center;gap:.75rem;" id="mobileBar">
  <button class="hamburger" id="hamburger" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
  <span style="color:#fff;font-weight:700;font-size:.95rem;" th:text="${clinicName}">Phòng Khám</span>
</div>

<div class="dash-wrap">
  <aside class="dash-sidebar">
    <div style="font-size:.78rem;color:#a0d4be;margin-bottom:1.1rem;font-style:italic;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;"
         th:text="${clinicName}">Phòng Khám</div>
    <div class="profile">
      <div class="profile-av" th:text="${#strings.toUpperCase(#strings.substring(doctor.fullName,0,2))}">BS</div>
      <div>
        <div class="profile-name" th:text="${doctor.fullName}">Bác sĩ</div>
        <div class="profile-role" th:text="${doctor.specialty}">Chuyên khoa</div>
      </div>
    </div>
    <a th:href="@{/doctor/dashboard}" class="nav-link active">🏠&nbsp; Dashboard</a>
    <a th:href="@{/doctor/slots}"     class="nav-link">⏰&nbsp; Quản lý slot</a>
    <div style="margin-top:auto;padding-top:2rem;">
      <a th:href="@{/auth/doctor/logout}" class="nav-link" style="color:#f87171;">⏻&nbsp; Đăng xuất</a>
    </div>
  </aside>

  <div class="dash-main">
    <!-- Header -->
    <div class="dash-header">
      <div>
        <h2 style="margin-bottom:.15rem;">Dashboard</h2>
        <div style="font-size:.82rem;color:var(--text-muted);font-style:italic;"
             th:text="${#temporals.format(today,'EEEE, dd/MM/yyyy', new java.util.Locale('vi'))}"></div>
      </div>
      <a th:href="@{/doctor/slots}" class="btn btn-primary btn-sm">+ Tạo slot</a>
    </div>

    <!-- KPI -->
    <div class="kpi-grid" style="margin-bottom:1.25rem;">
      <div class="kpi-card">
        <div class="kpi-label">📋 Hôm nay</div>
        <div class="kpi-value" th:text="${todayCount}">0</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">✓ Xác nhận</div>
        <div class="kpi-value green" th:text="${confirmedCount}">0</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">🏁 Hoàn thành</div>
        <div class="kpi-value amber" th:text="${completedCount}">0</div>
      </div>
    </div>

    <!-- Chart + Timeline row -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.1rem;margin-bottom:1.25rem;">

      <!-- Bar chart 7 ngày -->
      <div class="chart-wrap">
        <div class="chart-title">Lịch hẹn 7 ngày gần nhất</div>
        <div class="bar-chart" id="weekChart"></div>
      </div>

      <!-- Hôm nay nhanh -->
      <div class="chart-wrap">
        <div class="chart-title">Hôm nay — nhanh</div>
        <div style="display:flex;gap:.55rem;flex-wrap:wrap;">
          <div style="flex:1;text-align:center;padding:.75rem .5rem;background:var(--primary-light);border-radius:9px;">
            <div style="font-size:1.6rem;font-weight:700;color:var(--primary);" th:text="${todayCount}">0</div>
            <div style="font-size:.75rem;color:var(--text-muted);">Tổng lịch</div>
          </div>
          <div style="flex:1;text-align:center;padding:.75rem .5rem;background:#f0fdf4;border-radius:9px;">
            <div style="font-size:1.6rem;font-weight:700;color:#16a34a;" th:text="${confirmedCount}">0</div>
            <div style="font-size:.75rem;color:var(--text-muted);">Chờ khám</div>
          </div>
          <div style="flex:1;text-align:center;padding:.75rem .5rem;background:#fafafa;border-radius:9px;">
            <div style="font-size:1.6rem;font-weight:700;color:#94a3b8;" th:text="${completedCount}">0</div>
            <div style="font-size:.75rem;color:var(--text-muted);">Đã xong</div>
          </div>
        </div>
        <div style="margin-top:.85rem;font-size:.8rem;color:var(--text-muted);">
          <div th:each="a, stat : ${todayAppointments}"
               th:if="${stat.index < 3}"
               style="display:flex;align-items:center;gap:.5rem;padding:.35rem 0;border-bottom:1px solid var(--border-light);">
            <span style="font-weight:700;color:var(--primary);min-width:38px;" th:text="${a.slot.startTime}"></span>
            <span th:text="${a.patientName}" style="flex:1"></span>
            <span th:class="${a.status.name()=='CONFIRMED'?'badge badge-success':'badge badge-muted'}" style="font-size:.68rem;"
                  th:text="${a.status.name()=='CONFIRMED'?'✓':'🏁'}"></span>
          </div>
        </div>
      </div>
    </div>

    <!-- Timeline lịch hẹn hôm nay -->
    <div class="table-wrap">
      <div style="padding:.85rem 1.1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;">
        <span style="font-weight:700;">📅 Lịch khám hôm nay</span>
        <span class="badge badge-primary" th:text="${todayCount} + ' lịch'"></span>
      </div>

      <div th:if="${todayAppointments.isEmpty()}" style="padding:2.5rem;text-align:center;color:var(--text-muted);">
        <div style="font-size:2rem;margin-bottom:.6rem;">📭</div>
        Không có lịch khám hôm nay.
      </div>

      <!-- Vertical timeline -->
      <div th:if="${!todayAppointments.isEmpty()}" style="padding:1.25rem 1.5rem;">
        <div class="timeline">
          <div th:each="appt : ${todayAppointments}" class="tl-item">
            <div th:class="${appt.status.name()=='CONFIRMED'?'tl-dot confirmed':
                             appt.status.name()=='COMPLETED'?'tl-dot completed':
                             appt.status.name()=='PENDING_OTP'?'tl-dot pending':'tl-dot cancelled'}"></div>
            <div class="tl-card">
              <div class="tl-time" th:text="${appt.slot.startTime} + ' – ' + ${appt.slot.endTime}"></div>
              <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:.75rem;">
                <div>
                  <div class="tl-name" th:text="${appt.patientName}"></div>
                  <div class="tl-meta">
                    <span th:text="${appt.patientPhone}"></span>
                    <span th:if="${appt.symptoms}" th:text="' · ' + ${appt.symptoms}"></span>
                  </div>
                </div>
                <div style="display:flex;flex-direction:column;align-items:flex-end;gap:.4rem;flex-shrink:0;">
                  <span th:class="${appt.status.name()=='CONFIRMED'?'badge badge-success':
                                    appt.status.name()=='COMPLETED'?'badge badge-muted':
                                    appt.status.name()=='PENDING_OTP'?'badge badge-pending':'badge badge-danger'}"
                        th:text="${appt.status.name()=='CONFIRMED'?'Xác nhận':
                                   appt.status.name()=='COMPLETED'?'Hoàn thành':
                                   appt.status.name()=='PENDING_OTP'?'Chờ OTP':'Đã hủy'}"></span>
                  <div style="display:flex;gap:.35rem;" th:if="${appt.status.name()=='CONFIRMED'}">
                    <form th:action="@{'/doctor/appointment/'+${appt.id}+'/complete'}" method="post" style="display:inline">
                      <button type="submit" class="btn btn-primary btn-sm">✓</button>
                    </form>
                    <form th:action="@{'/doctor/appointment/'+${appt.id}+'/cancel'}" method="post" style="display:inline">
                      <button type="submit" class="btn btn-danger btn-sm" onclick="return confirm('Hủy lịch hẹn?')">✕</button>
                    </form>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script th:src="@{/js/app.js}"></script>
<script th:inline="javascript">
  const labels = /*[[${chartLabels}]]*/ '';
  const values = /*[[${chartValues}]]*/ '';
  if (labels) {
    const L = labels.split(',');
    const V = values.split(',').map(Number);
    const todayFmt = new Date().toLocaleDateString('vi-VN',{day:'2-digit',month:'2-digit'}).replace('/','/');
    renderBarChart('weekChart', L, V, L[L.length-1]);
  }
  // Show mobile bar on small screens
  if (window.innerWidth <= 768) document.getElementById('mobileBar').style.display='flex';
  window.addEventListener('resize', () => {
    document.getElementById('mobileBar').style.display = window.innerWidth<=768?'flex':'none';
  });
</script>
</body>
</html>
