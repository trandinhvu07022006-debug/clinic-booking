<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Danh sách bác sĩ</title>
  <link href="https://fonts.googleapis.com/css2?family=Tinos:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div id="sidebarOverlay" class="sidebar-overlay"></div>
<div class="dash-wrap">

  <aside class="dash-sidebar" style="background:linear-gradient(180deg,#134e4a,#0d9488);">
    <div style="font-size:.82rem;color:#a0d4be;margin-bottom:1.25rem;font-style:italic;"
         th:text="${clinicName}">Phòng Khám</div>
    <div class="profile">
      <div class="profile-av">AD</div>
      <div><div class="profile-name">Quản trị viên</div><div class="profile-role">Admin</div></div>
    </div>
    <a th:href="@{/admin/dashboard}"    class="nav-link">📊&nbsp; Dashboard</a>
    <a th:href="@{/admin/doctors}"      class="nav-link active">👨‍⚕️&nbsp; Bác sĩ</a>
    <a th:href="@{/admin/appointments}" class="nav-link">📋&nbsp; Lịch hẹn</a>
    <div style="margin-top:auto;padding-top:2rem;">
      <a th:href="@{/auth/admin/logout}" class="nav-link" style="color:#f87171;">⏻&nbsp; Đăng xuất</a>
    </div>
  </aside>

  <div class="dash-main">
    <div class="dash-header">
      <div>
        <h2 style="margin-bottom:.15rem;">Danh sách bác sĩ</h2>
        <div style="font-size:.82rem;color:var(--text-muted);font-style:italic;"
             th:text="${doctors.size()} + ' bác sĩ'"></div>
      </div>
      <a th:href="@{/admin/doctors/new}" class="btn btn-primary">+ Thêm bác sĩ</a>
    </div>

    <!-- Doctor cards grid -->
    <div th:if="${!doctors.isEmpty()}"
         style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1rem;margin-bottom:1.5rem;">
      <div th:each="d : ${doctors}"
           style="background:#fff;border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;transition:box-shadow .15s;"
           onmouseover="this.style.boxShadow='var(--shadow-md)'"
           onmouseout="this.style.boxShadow='none'">
        <div style="display:flex;align-items:center;gap:.85rem;margin-bottom:.9rem;">
          <div class="doctor-av" style="width:44px;height:44px;font-size:1rem;flex-shrink:0;"
               th:text="${#strings.toUpperCase(#strings.substring(d.fullName,0,2))}">BS</div>
          <div>
            <div style="font-weight:700;" th:text="${d.fullName}"></div>
            <div style="font-size:.82rem;color:var(--primary);font-style:italic;"
                 th:text="${d.specialty}"></div>
          </div>
          <span th:class="${d.status.name()=='ACTIVE' ? 'badge badge-success' : 'badge badge-danger'}"
                th:text="${d.status.name()=='ACTIVE' ? '● Hoạt động' : '○ Ngừng'}"
                style="margin-left:auto;"></span>
        </div>
        <div style="font-size:.82rem;color:var(--text-muted);line-height:1.65;">
          <div>🔑 <code th:text="${d.username}" style="font-size:.78rem;background:var(--bg-secondary);padding:.1rem .4rem;border-radius:4px;"></code></div>
          <div>📧 <span th:text="${d.email}"></span></div>
          <div th:if="${d.phone}">📞 <span th:text="${d.phone}"></span></div>
          <div th:if="${d.bio}" style="margin-top:.45rem;font-style:italic;"
               th:text="${d.bio}"></div>
        </div>
      </div>
    </div>

    <!-- Empty -->
    <div th:if="${doctors.isEmpty()}"
         style="text-align:center;padding:3rem;background:#fff;border:1px solid var(--border);border-radius:var(--radius-lg);color:var(--text-muted);">
      <div style="font-size:2rem;margin-bottom:.75rem;">👨‍⚕️</div>
      Chưa có bác sĩ nào. <a th:href="@{/admin/doctors/new}">Thêm ngay →</a>
    </div>
  </div>
</div>
<script th:src="@{/js/app.js}"></script>
<script>
if(window.innerWidth<=768){var mb=document.createElement("div");mb.style="display:flex;background:var(--primary-dark);padding:.75rem 1rem;position:sticky;top:0;z-index:200;align-items:center;gap:.75rem;";mb.innerHTML="<button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>";document.body.insertBefore(mb,document.querySelector(".dash-wrap"));}
</script>
</body>
</html>
